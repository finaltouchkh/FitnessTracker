  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --red: #e8291c;
      --red-dim: #9e1c12;
      --white: #f0ede8;
      --grey: #888;
      --light-grey: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      background: var(--dark);
      border-bottom: 2px solid var(--red);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--white);
      line-height: 1;
    }

    .logo span { color: var(--red); }

    .program-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--grey);
      text-transform: uppercase;
    }

    /* DAY SELECTOR */
    .day-selector-wrap {
      background: var(--dark);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .day-selector-wrap::-webkit-scrollbar { display: none; }

    .day-selector {
      display: flex;
      gap: 8px;
      width: max-content;
    }

    .day-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--grey);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      border-radius: 2px;
    }

    .day-btn:hover {
      border-color: var(--red-dim);
      color: var(--white);
    }

    .day-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: var(--white);
    }

    .day-btn.rest {
      border-style: dashed;
    }

    .day-btn.rest.active {
      background: var(--light-grey);
      border-color: var(--light-grey);
      border-style: solid;
    }

    /* MAIN CONTENT */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* DAY HEADER */
    .day-header {
      margin-bottom: 20px;
      animation: fadeUp 0.3s ease;
    }

    .day-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 4px;
      color: var(--red);
      margin-bottom: 4px;
    }

    .day-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 2px;
      line-height: 1;
      color: var(--white);
    }

    .muscle-tag {
      display: inline-block;
      margin-top: 8px;
      background: var(--border);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--grey);
      padding: 4px 10px;
      border-radius: 2px;
    }

    /* VIDEO */
    .video-link {
      display: block;
      position: relative;
      width: 100%;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 24px;
      animation: fadeUp 0.3s ease 0.05s both;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }

    .video-link:hover {
      border-color: var(--red);
      transform: translateY(-1px);
    }

    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-btn {
      width: 64px;
      height: 64px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 4px 20px rgba(232,41,28,0.4);
    }

    .video-link:hover .play-btn {
      transform: scale(1.1);
      background: #ff3322;
    }

    .play-btn svg {
      width: 24px;
      height: 24px;
      fill: white;
      margin-left: 4px;
    }

    .video-label {
      position: absolute;
      bottom: 12px;
      left: 14px;
      right: 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    /* REST DAY */
    .rest-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 24px;
      animation: fadeUp 0.3s ease 0.05s both;
    }

    .rest-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .rest-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: var(--grey);
      margin-bottom: 8px;
    }

    .rest-card p {
      font-size: 0.85rem;
      color: var(--light-grey);
      font-weight: 300;
    }

    /* EXERCISES */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
      animation: fadeUp 0.3s ease 0.1s both;
    }

    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: fadeUp 0.3s ease 0.15s both;
    }

    .exercise-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.2s;
      border-radius: 2px;
    }

    .exercise-item:hover {
      border-left-color: var(--red);
    }

    .ex-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--red-dim);
      min-width: 24px;
    }

    .ex-name {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--white);
    }

    .ex-sets-reps {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--grey);
      letter-spacing: 0.5px;
      white-space: nowrap;
      text-align: right;
    }

    .fst7-badge {
      display: inline-block;
      background: var(--red-dim);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 2px 5px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .note-badge {
      display: block;
      font-size: 0.7rem;
      color: var(--grey);
      font-weight: 300;
      margin-top: 2px;
      font-style: italic;
    }

    /* SET COUNTER */
    .set-counter {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: fadeUp 0.3s ease 0.08s both;
    }

    .counter-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--grey);
    }

    .counter-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .counter-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: var(--white);
      min-width: 48px;
      text-align: center;
      line-height: 1;
      transition: color 0.1s;
    }

    .counter-display.flash { color: var(--red); }

    .counter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      width: 44px;
      height: 44px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .counter-btn:active { background: var(--border); transform: scale(0.93); }

    .counter-btn.plus {
      background: var(--red);
      border-color: var(--red);
      font-size: 2rem;
      width: 56px;
      height: 56px;
    }

    .counter-btn.plus:active { background: #ff3322; }

    .counter-reset {
      background: none;
      border: none;
      color: var(--light-grey);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .counter-reset:active { color: var(--red); }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* FOOTER NAV */
    .nav-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      gap: 12px;
      animation: fadeUp 0.3s ease 0.2s both;
    }

    .nav-btn {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--grey);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 2px;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--red);
      color: var(--white);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>

let currentDay = 0;
let setCount = 0;

function haptic() {
  if (navigator.vibrate) navigator.vibrate(50);
}

function incrementSet() {
  haptic();
  setCount++;
  const el = document.getElementById('setCount');
  if (el) {
    el.textContent = setCount;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 150);
  }
}

function resetSet() {
  haptic();
  setCount = 0;
  const el = document.getElementById('setCount');
  if (el) el.textContent = '0';
}

function openVideo(url) {
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function renderDaySelector() {
  const sel = document.getElementById('daySelector');
  sel.innerHTML = workouts.map((w, i) => `
    <button class="day-btn ${w.isRest ? 'rest' : ''} ${i === currentDay ? 'active' : ''}"
      onclick="selectDay(${i})">
      Day ${w.day}${w.isRest ? ' ·' : ''}
    </button>
  `).join('');
}

        src="https://img.youtube.com/vi/${w.videoId}/hqdefault.jpg"
        alt="${w.title}" loading="lazy">
      <div class="video-overlay">
        <div class="play-btn">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <div class="video-label">Watch on YouTube</div>
    </div>
  `;

  const counterBlock = !w.isRest ? `
    <div class="set-counter">
      <div>
        <div class="counter-label">Set Counter</div>
        <button class="counter-reset" onclick="resetSet()">Reset</button>
      </div>
      <div class="counter-controls">
        <span class="counter-display" id="setCount">0</span>
        <button class="counter-btn plus" onclick="incrementSet()">+</button>
      </div>
    </div>
  ` : '';

  const restBlock = w.isRest ? `
    <div class="rest-card">
      <div class="rest-icon">🥩</div>
      <h3>Rest & Recover</h3>
      <p>${w.subtitle || 'Focus on nutrition and recovery today.'}</p>
    </div>
  ` : '';

  main.innerHTML = `
    <div class="day-header">
      <div class="day-number">Day ${w.day}</div>
      <div class="day-title">${w.title}</div>
      <span class="muscle-tag">${w.muscles}</span>
    </div>
    ${counterBlock}
    ${videoBlock}
    ${restBlock}
    ${exercisesHTML}
    <div class="nav-footer">
      <button class="nav-btn" onclick="selectDay(${currentDay - 1})" ${currentDay === 0 ? 'disabled' : ''}>← Prev Day</button>
      <button class="nav-btn" onclick="selectDay(${currentDay + 1})" ${currentDay === workouts.length - 1 ? 'disabled' : ''}>Next Day →</button>
    </div>
  `;
}

function selectDay(index) {
  if (index < 0 || index >= workouts.length) return;
  currentDay = index;
  renderDaySelector();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
renderDaySelector();
renderContent();
</script>
</body>
</html>
